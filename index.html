<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marée Haute Marée Basse | Saint-Malo</title>
    <meta name="robots" content="index,follow" />
    <link rel="icon" href="favicon.jpg" />
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: #000;
        overflow: hidden;
      }

      .bg {
        position: fixed;
        inset: 0;
      }

      .bg video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: center;
      }

      .center {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
        z-index: 2;
      }

      .center img {
        width: clamp(180px, 26vw, 420px);
        max-width: min(82vw, 520px);
        height: auto;
        filter: drop-shadow(0 18px 46px rgba(0, 0, 0, 0.45));
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <video
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        disablepictureinpicture
        controlslist="nodownload noplaybackrate noremoteplayback"
      >
        <source src="7031087_Above_Aerial_1280.mp4" type="video/mp4" />
      </video>
    </div>

    <div class="center">
      <img src="logo-mhmb-white.svg" alt="MHMB" />
    </div>
  </body>
</html>
